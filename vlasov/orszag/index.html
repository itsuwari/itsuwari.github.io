<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TTDL Orszag WASM Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap">
    <section class="card">
      <div class="row" style="justify-content: space-between; gap: 12px; align-items: baseline; flex-wrap: wrap;">
        <div>
          <h1>Orszag-Tang (WASM) — backend compare</h1>
          <p>Choose a backend and run a fast vibrancy-heavy input on the browser.</p>
        </div>
        <span id="status" class="status">Idle</span>
      </div>
    </section>

    <section class="card">
      <canvas id="canvas" width="640" height="640"></canvas>
    </section>

    <section class="card">
      <div class="row" style="align-items: flex-start; flex-wrap: wrap;">
        <label>
          Backend
          <select id="backend">
            <option value="qtt_family4_paper" selected>QTT family4_paper</option>
            <option value="qtt_family3">QTT family3</option>
            <option value="dlr">DLR</option>
          </select>
        </label>
        <label>
          Orszag preset
          <select id="orszagPreset">
            <option value="custom" selected>custom</option>
            <option value="fig3a">fig3a</option>
            <option value="fig3b">fig3b</option>
            <option value="fig3c">fig3c</option>
          </select>
        </label>
        <label>
          Method
          <select id="method">
            <option value="strang">strang</option>
            <option value="lie">lie</option>
          </select>
        </label>
        <label>
          Profile
          <select id="profile">
            <option value="debug" selected>debug</option>
            <option value="paper">paper</option>
          </select>
        </label>
        <label>
          Nx
          <input id="nx" type="number" min="16" step="1" value="64" />
        </label>
        <label>
          Ny
          <input id="ny" type="number" min="16" step="1" value="64" />
        </label>
        <label>
          nvx
          <input id="nvx" type="number" min="8" step="1" value="16" />
        </label>
        <label>
          nvy
          <input id="nvy" type="number" min="8" step="1" value="16" />
        </label>
        <label>
          nvz
          <input id="nvz" type="number" min="8" step="1" value="16" />
        </label>
        <label>
          Rank F
          <input id="rankF" type="number" min="1" step="1" value="24" />
        </label>
        <label>
          Rank EM
          <input id="rankEM" type="number" min="1" step="1" value="24" />
        </label>
      </div>

      <div class="row" style="align-items: flex-start; flex-wrap: wrap; margin-top: 12px;">
        <label>
          dt
          <input id="dt" type="number" step="0.000001" value="0.001" />
        </label>
        <label>
          final time
          <input id="tfinal" type="number" step="0.1" value="12" />
        </label>
        <label>
          report points
          <input id="reportPoints" type="number" min="20" step="1" value="200" />
        </label>
        <label>
          snapshots
          <input id="snapshotCount" type="number" min="1" step="1" value="1" />
        </label>
        <label>
          lbox dp
          <input id="lbox" type="number" step="0.01" value="3.141592653589793" />
        </label>
        <label>
          b0 / Bg
          <input id="b0OverBg" type="number" step="0.05" value="1.8" />
        </label>
        <label>
          u0 / vA
          <input id="u0OverVa" type="number" step="0.05" value="1.4" />
        </label>
        <label>
          beta_p
          <input id="betaP" type="number" step="0.01" value="0.03" />
        </label>
        <label>
          mp/me
          <input id="mpMe" type="number" min="1.1" step="0.1" value="25" />
        </label>
        <label>
          tp/te
          <input id="tpTe" type="number" min="0.1" step="0.1" value="1" />
        </label>
        <label>
          c/va
          <input id="cOverVa" type="number" min="1" step="0.1" value="50" />
        </label>
        <label>
          vbound sigma
          <input id="vboundSigma" type="number" min="1" step="0.1" value="7" />
        </label>
      </div>

    <div class="row" style="margin-top: 12px; align-items: center;">
      <button id="runBtn">Run Orszag</button>
      <button id="presetBtn">Load Vibrant Preset</button>
      <button id="fig3PresetBtn">Load Fig3 Preset</button>
      <span id="backendHint" class="hint"></span>
    </div>
  </section>

    <section class="card">
      <div class="row" style="justify-content: space-between;">
        <div class="small">Frames: <span id="frameCount">0</span> | Step: <span id="frameIndex">0</span>/<span id="frameMax">0</span> | time: <span id="frameTime">--</span> | range: <span id="rangeLabel">--</span></div>
        <div class="small">Runtime: <span id="runtime">--</span> | C++: <span id="cppTime">--</span> | Heap: <span id="heap">--</span></div>
      </div>
      <input id="frameSlider" type="range" min="0" max="0" value="0" />
    </section>

    <section class="card log">
      <pre id="log"></pre>
    </section>
  </div>

  <script src="../alfven/alfven_wasm_embed.js?v=2026-02-12i"></script>
  <script src="../alfven/alfven_wasm.js?v=2026-02-12i"></script>
  <script src="main.js"></script>
</body>
</html>
