<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>salty.li</title>
        <style>
            :root {
                --ink: #1b1b1b;
                --salt: #f6c9d2;
                --salt-facet: #eda9b8;
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html,
            body {
                height: 100%;
                background: #ffffff;
                overflow: hidden;
                font-family: ui-monospace, "Helvetica";
            }
            canvas {
                display: block;
                position: fixed;
                inset: 0;
            }
            header {
                position: fixed;
                top: 28px;
                left: 32px;
                z-index: 2;
            }
            header h1 {
                font-size: 15px;
                font-weight: 500;
                letter-spacing: 0.02em;
                color: var(--ink);
            }
            .blog-link {
                margin-top: 14px;
                font-size: 17px;
                color: var(--ink);
            }
            .blog-link .label {
                display: block;
                font-size: 12px;
                color: #8a8a8a;
                margin-bottom: 3px;
                letter-spacing: 0.02em;
            }
            .blog-link a {
                color: var(--ink);
                text-decoration: none;
                font-weight: 600;
                border-bottom: 1.5px solid var(--ink);
                padding-bottom: 1px;
            }
            .blog-link a:hover {
                opacity: 0.5;
            }
            .blog-link a:focus-visible {
                outline: 1px solid var(--ink);
                outline-offset: 1px;
                border-bottom-color: transparent;
            }
        </style>
    </head>
    <body>
        <header>
            <h1>salty.li</h1>
            <p class="blog-link">
                <span class="label">Visit my blog:</span
                ><a href="https://blog.salty.li">blog.salty.li</a>
            </p>
        </header>
        <canvas id="sea"></canvas>

        <script>
            (() => {
                const canvas = document.getElementById("sea");
                const ctx = canvas.getContext("2d");
                const reduceMotion = window.matchMedia(
                    "(prefers-reduced-motion: reduce)",
                ).matches;

                let W = 0,
                    H = 0,
                    DPR = 1;
                function resize() {
                    DPR = Math.min(window.devicePixelRatio || 1, 2);
                    W = window.innerWidth;
                    H = window.innerHeight;
                    canvas.width = W * DPR;
                    canvas.height = H * DPR;
                    canvas.style.width = W + "px";
                    canvas.style.height = H + "px";
                    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
                }
                resize();

                /* ---------------- deterministic layout from a window fingerprint ----------------
     No storage is used. Instead we hash stable characteristics of this browser/
     display (screen size, pixel depth, timezone, language, platform, cpu count)
     into a seed, then drive an all-local PRNG from it. Same window -> same seed ->
     same rocks, every refresh — without writing anything to disk. */
                function fingerprintSeed() {
                    const bits = [
                        navigator.userAgent || "",
                        navigator.language || "",
                        String(navigator.hardwareConcurrency || ""),
                        navigator.platform || "",
                        String(screen.width),
                        String(screen.height),
                        String(screen.colorDepth || ""),
                        String(new Date().getTimezoneOffset()),
                        String(window.devicePixelRatio || 1),
                    ].join("|");
                    let h = 2166136261;
                    for (let i = 0; i < bits.length; i++) {
                        h ^= bits.charCodeAt(i);
                        h = Math.imul(h, 16777619);
                    }
                    return h >>> 0;
                }
                function mulberry32(seed) {
                    return function () {
                        seed |= 0;
                        seed = (seed + 0x6d2b79f5) | 0;
                        let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
                        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
                        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
                    };
                }
                const FP_SEED = fingerprintSeed();

                /* ---------------- salt rocks ---------------- */
                let rocks = [];
                function makeRock(cx, cy, r, rng) {
                    const n = 6 + Math.floor(rng() * 3);
                    const pts = [];
                    const start = rng() * Math.PI * 2;
                    for (let i = 0; i < n; i++) {
                        const a =
                            start + (i / n) * Math.PI * 2 + (rng() - 0.5) * 0.4;
                        const rr = r * (0.72 + rng() * 0.4);
                        pts.push([
                            cx + Math.cos(a) * rr,
                            cy + Math.sin(a) * rr,
                        ]);
                    }
                    // one or two interior facet lines
                    const facets = [];
                    const fCount = 1 + Math.floor(rng() * 2);
                    for (let i = 0; i < fCount; i++) {
                        const a1 = Math.floor(rng() * n);
                        let a2 = (a1 + 2 + Math.floor(rng() * (n - 4))) % n;
                        facets.push([a1, a2]);
                    }
                    return { cx, cy, r, pts, facets };
                }

                // rocks live only in a mirrored "L" hugging the right edge and the bottom
                // edge, leaving the upper-left of the page clear for text.
                function inRockZone(x, y) {
                    const rightBar = x > W * 0.6;
                    const bottomBar = y > H * 0.66 && x > W * 0.5;
                    return rightBar || bottomBar;
                }

                function scatterRocks() {
                    rocks = [];
                    const rng = mulberry32(FP_SEED); // fresh, deterministic sequence every call
                    const count = Math.max(
                        5,
                        Math.min(9, Math.floor((W * H) / 220000)),
                    );
                    let tries = 0;
                    while (rocks.length < count && tries < 1200) {
                        tries++;
                        const r = 24 + rng() * 38;
                        const cx = 60 + rng() * (W - 120);
                        const cy = 80 + rng() * (H - 160);
                        if (!inRockZone(cx, cy)) continue;
                        let ok = true;
                        for (const o of rocks) {
                            const d = Math.hypot(cx - o.cx, cy - o.cy);
                            if (d < r + o.r + 110) {
                                ok = false;
                                break;
                            }
                        }
                        if (ok) rocks.push(makeRock(cx, cy, r, rng));
                    }
                }
                scatterRocks();

                function drawRocks() {
                    for (const rock of rocks) {
                        ctx.beginPath();
                        const p = rock.pts;
                        ctx.moveTo(p[0][0], p[0][1]);
                        for (let i = 1; i < p.length; i++)
                            ctx.lineTo(p[i][0], p[i][1]);
                        ctx.closePath();
                        ctx.fillStyle = "var(--salt)";
                        ctx.fillStyle = "#f6c9d2";
                        ctx.fill();
                        ctx.strokeStyle = "#eda9b8";
                        ctx.lineWidth = 1.2;
                        ctx.lineJoin = "round";
                        ctx.stroke();
                        // facets
                        ctx.beginPath();
                        for (const [a, b] of rock.facets) {
                            ctx.moveTo(p[a][0], p[a][1]);
                            ctx.lineTo(p[b][0], p[b][1]);
                        }
                        ctx.stroke();
                    }
                }

                /* ---------------- fish ---------------- */
                const SEG = 24; // spine segments
                const SEG_LEN = 7; // px between segments
                const spine = [];
                let heading = Math.random() * Math.PI * 2;
                let angVel = 0; // smoothed angular velocity
                const SPEED = 85; // px / s
                let wanderPhase = Math.random() * 1000;
                let swimPhase = 0; // accumulated tail phase — keeps the wiggle perfectly smooth

                function initFish() {
                    const x = W * 0.5,
                        y = H * 0.5;
                    spine.length = 0;
                    for (let i = 0; i < SEG; i++) {
                        spine.push({
                            x: x - Math.cos(heading) * i * SEG_LEN,
                            y: y - Math.sin(heading) * i * SEG_LEN,
                        });
                    }
                }
                initFish();

                // half-width of the body at t in [0,1] (nose -> tail)
                function bodyWidth(t) {
                    if (t < 0.32) {
                        // nose swell
                        const u = t / 0.32;
                        return 11 * Math.sin(u * Math.PI * 0.5);
                    }
                    // taper toward the peduncle
                    const u = (t - 0.32) / 0.68;
                    return 11 * (1 - u) * (1 - u * 0.35) + 0.6;
                }

                function angDiff(a, b) {
                    let d = a - b;
                    while (d > Math.PI) d -= Math.PI * 2;
                    while (d < -Math.PI) d += Math.PI * 2;
                    return d;
                }

                function steer(dt, time) {
                    // wander: smooth pseudo-noise from layered sines
                    wanderPhase += dt;
                    const wander =
                        Math.sin(wanderPhase * 0.53) * 0.55 +
                        Math.sin(wanderPhase * 0.21 + 1.7) * 0.75 +
                        Math.sin(wanderPhase * 0.087 + 4.1) * 0.9;

                    let steerTarget = wander * 0.42;

                    const head = spine[0];

                    // soft wall avoidance: steer toward center when near edges
                    const margin = 120;
                    let wallX = 0,
                        wallY = 0;
                    if (head.x < margin) wallX = (margin - head.x) / margin;
                    if (head.x > W - margin)
                        wallX = -(head.x - (W - margin)) / margin;
                    if (head.y < margin) wallY = (margin - head.y) / margin;
                    if (head.y > H - margin)
                        wallY = -(head.y - (H - margin)) / margin;
                    if (wallX !== 0 || wallY !== 0) {
                        const desired = Math.atan2(wallY, wallX);
                        const d = angDiff(desired, heading);
                        const strength = Math.min(1, Math.hypot(wallX, wallY));
                        steerTarget += d * 2.6 * strength;
                    }

                    // rock avoidance: predictive — react to rocks near a point ahead of the nose
                    const lookX = head.x + Math.cos(heading) * 70;
                    const lookY = head.y + Math.sin(heading) * 70;
                    for (const rock of rocks) {
                        const safe = rock.r + 70;
                        // whichever is closer to the rock: the nose or the lookahead point
                        const dHead = Math.hypot(
                            head.x - rock.cx,
                            head.y - rock.cy,
                        );
                        const dLook = Math.hypot(
                            lookX - rock.cx,
                            lookY - rock.cy,
                        );
                        const dist = Math.min(dHead, dLook);
                        if (dist < safe) {
                            const away = Math.atan2(
                                head.y - rock.cy,
                                head.x - rock.cx,
                            );
                            const d = angDiff(away, heading);
                            const strength = 1 - dist / safe;
                            steerTarget += d * 6 * strength;
                        }
                    }

                    // clamp desired turning and smooth angular velocity -> no sudden jumps
                    const maxTurn = 0.95; // rad/s
                    steerTarget = Math.max(
                        -maxTurn,
                        Math.min(maxTurn, steerTarget),
                    );
                    angVel += (steerTarget - angVel) * Math.min(1, dt * 4.5);
                    heading += angVel * dt;

                    // gentle speed variation, always positive and smooth
                    const speed = SPEED * (1 + Math.sin(time * 0.0007) * 0.12);

                    head.x += Math.cos(heading) * speed * dt;
                    head.y += Math.sin(heading) * speed * dt;

                    // hard clamp just in case (should rarely trigger thanks to soft walls)
                    head.x = Math.max(8, Math.min(W - 8, head.x));
                    head.y = Math.max(8, Math.min(H - 8, head.y));

                    // spine follows head: constraint chain with limited bend per joint
                    const maxBend = 0.09;
                    let prevAngle = heading + Math.PI; // spine trails behind the head
                    for (let i = 1; i < SEG; i++) {
                        const a = spine[i - 1],
                            b = spine[i];
                        const raw = Math.atan2(b.y - a.y, b.x - a.x);
                        let diff = angDiff(raw, prevAngle);
                        diff = Math.max(-maxBend, Math.min(maxBend, diff));
                        const ang = prevAngle + diff;
                        b.x = a.x + Math.cos(ang) * SEG_LEN;
                        b.y = a.y + Math.sin(ang) * SEG_LEN;
                        prevAngle = ang;
                    }

                    // relaxed, constant-rate tail phase (accumulated, so it can never jump)
                    swimPhase += dt * 3.2;

                    // hard guarantee: no spine point ever sits inside a rock —
                    // gently project any offending point out along the radial direction
                    for (const rock of rocks) {
                        const eff = rock.r + 14; // rock radius + body half-width margin
                        for (let i = 0; i < SEG; i++) {
                            const p = spine[i];
                            const dx = p.x - rock.cx,
                                dy = p.y - rock.cy;
                            const d = Math.hypot(dx, dy) || 0.0001;
                            if (d < eff) {
                                const push = eff - d;
                                p.x += (dx / d) * push;
                                p.y += (dy / d) * push;
                            }
                        }
                    }
                }

                function drawFish() {
                    // relaxed swim undulation: constant slow phase, lateral offset at draw time only
                    const pts = [];
                    for (let i = 0; i < SEG; i++) {
                        const t = i / (SEG - 1);
                        // local direction along the spine
                        const p0 = spine[Math.max(0, i - 1)];
                        const p1 = spine[Math.min(SEG - 1, i + 1)];
                        let dx = p1.x - p0.x,
                            dy = p1.y - p0.y;
                        const d = Math.hypot(dx, dy) || 0.0001;
                        dx /= d;
                        dy /= d;
                        const nx = -dy,
                            ny = dx;
                        const wig =
                            Math.sin(swimPhase - i * 0.38) *
                            2.4 *
                            Math.pow(t, 1.7);
                        pts.push({
                            x: spine[i].x + nx * wig,
                            y: spine[i].y + ny * wig,
                            nx,
                            ny,
                            t,
                        });
                    }

                    // build outline: left side nose->tail, tail fin, right side tail->nose
                    const L = [],
                        R = [];
                    for (const p of pts) {
                        const w = bodyWidth(p.t);
                        L.push([p.x + p.nx * w, p.y + p.ny * w]);
                        R.push([p.x - p.nx * w, p.y - p.ny * w]);
                    }

                    const tail = pts[SEG - 1];
                    const pre = pts[SEG - 2];
                    let tdx = tail.x - pre.x,
                        tdy = tail.y - pre.y;
                    const td = Math.hypot(tdx, tdy) || 0.0001;
                    tdx /= td;
                    tdy /= td;
                    const finLen = 16,
                        finSpread = 9;
                    const finUp = [
                        tail.x + tdx * finLen + tail.nx * finSpread,
                        tail.y + tdy * finLen + tail.ny * finSpread,
                    ];
                    const finMid = [
                        tail.x + tdx * finLen * 0.35,
                        tail.y + tdy * finLen * 0.35,
                    ];
                    const finDown = [
                        tail.x + tdx * finLen - tail.nx * finSpread,
                        tail.y + tdy * finLen - tail.ny * finSpread,
                    ];

                    ctx.strokeStyle = "#1b1b1b";
                    ctx.lineWidth = 1.6;
                    ctx.lineJoin = "round";
                    ctx.lineCap = "round";

                    ctx.beginPath();
                    // nose
                    ctx.moveTo(pts[0].x, pts[0].y);
                    // left side, smoothed with midpoints
                    for (let i = 0; i < L.length - 1; i++) {
                        const mx = (L[i][0] + L[i + 1][0]) / 2;
                        const my = (L[i][1] + L[i + 1][1]) / 2;
                        ctx.quadraticCurveTo(L[i][0], L[i][1], mx, my);
                    }
                    // forked tail
                    ctx.lineTo(finUp[0], finUp[1]);
                    ctx.lineTo(finMid[0], finMid[1]);
                    ctx.lineTo(finDown[0], finDown[1]);
                    ctx.lineTo(R[R.length - 1][0], R[R.length - 1][1]);
                    // right side back to nose
                    for (let i = R.length - 1; i > 0; i--) {
                        const mx = (R[i][0] + R[i - 1][0]) / 2;
                        const my = (R[i][1] + R[i - 1][1]) / 2;
                        ctx.quadraticCurveTo(R[i][0], R[i][1], mx, my);
                    }
                    ctx.closePath();
                    ctx.stroke();

                    // eye
                    const ep = pts[2];
                    ctx.beginPath();
                    ctx.arc(
                        ep.x + ep.nx * 3.5,
                        ep.y + ep.ny * 3.5,
                        1.5,
                        0,
                        Math.PI * 2,
                    );
                    ctx.fillStyle = "#1b1b1b";
                    ctx.fill();
                }

                /* ---------------- loop ---------------- */
                let last = performance.now();
                function frame(now) {
                    let dt = (now - last) / 1000;
                    last = now;
                    dt = Math.min(dt, 0.05); // avoid jumps after tab switch

                    steer(dt, now);
                    ctx.clearRect(0, 0, W, H);
                    drawRocks();
                    drawFish();

                    requestAnimationFrame(frame);
                }

                if (reduceMotion) {
                    // single calm frame
                    for (let i = 0; i < 120; i++) steer(1 / 60, i * 16);
                    ctx.clearRect(0, 0, W, H);
                    drawRocks();
                    drawFish();
                } else {
                    requestAnimationFrame(frame);
                }

                let resizeTimer;
                window.addEventListener("resize", () => {
                    clearTimeout(resizeTimer);
                    resizeTimer = setTimeout(() => {
                        resize();
                        scatterRocks();
                        if (reduceMotion) {
                            ctx.clearRect(0, 0, W, H);
                            drawRocks();
                            drawFish();
                        }
                    }, 150);
                });
            })();
        </script>
    </body>
</html>
